version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: my_docker_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my_docker_app
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data: